<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riff | iCloud 앱 비밀번호 발급 가이드</title>
    <style>
      :root {
        --bg: #f6fbf7;
        --surface: #ffffff;
        --text: #18201b;
        --muted: #5c6a60;
        --line: #d2e7d7;
        --green-10: #ecfff5;
        --green-20: #d2fae0;
        --green-50: #80e2a2;
        --green-60: #34c968;
        --green-70: #16a34a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      body {
        min-height: 100vh;
      }

      .page {
        max-width: 820px;
        margin: 0 auto;
        padding: 24px 16px 110px;
      }

      .header {
        margin-bottom: 14px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--green-10);
        color: var(--green-70);
        border: 1px solid var(--green-20);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 10px 0 6px;
        font-size: clamp(20px, 4vw, 28px);
        line-height: 1.3;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .card {
        margin-top: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(22, 163, 74, 0.06);
        overflow: hidden;
      }

      .cardHead {
        padding: 16px 16px 12px;
        border-bottom: 1px solid #eef5f0;
      }

      .stepMeta {
        font-size: 12px;
        font-weight: 700;
        color: var(--green-70);
      }

      .stepTitle {
        margin: 6px 0 8px;
        font-size: clamp(18px, 3.8vw, 24px);
        line-height: 1.3;
      }

      .stepDesc {
        margin: 0;
        color: #3f4c44;
        font-size: 15px;
        line-height: 1.6;
      }

      .inlineLink {
        color: var(--green-70);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid var(--green-60);
      }

      .imageWrap {
        background: #f8fbf9;
        padding: 12px;
      }

      .stepImage {
        display: block;
        width: 100%;
        max-height: 58vh;
        object-fit: contain;
        border-radius: 12px;
        border: 1px solid #eaf3ed;
        background: #fff;
      }

      .dots {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
        margin-top: 14px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c6d7cc;
      }

      .dot.active {
        width: 24px;
        border-radius: 999px;
        background: var(--green-60);
      }

      .footerNav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10;
        background: rgba(246, 251, 247, 0.95);
        backdrop-filter: blur(6px);
        border-top: 1px solid #dbeee1;
      }

      .footerInner {
        max-width: 820px;
        margin: 0 auto;
        padding: 12px 16px 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .navButton {
        min-height: 44px;
        border-radius: 12px;
        border: 1px solid var(--green-20);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .navButton.prev {
        color: var(--green-70);
        background: #fff;
      }

      .navButton.next {
        color: #fff;
        background: var(--green-70);
        border-color: var(--green-70);
      }

      .navButton:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .tip {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #f1f9f3;
        border: 1px solid var(--green-20);
        color: #33513e;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <span class="badge">Riff iCloud 동기화 안내</span>
        <h1>Apple 앱 전용 비밀번호 발급 방법</h1>
        <p class="sub">
          아래 단계를 순서대로 따라 해주세요. 발급된 비밀번호는 Riff의 iCloud
          계정정보 입력 화면 암호 칸에 입력하면 됩니다.
        </p>
      </header>

      <section class="card" aria-live="polite">
        <div class="cardHead">
          <div id="stepMeta" class="stepMeta"></div>
          <h2 id="stepTitle" class="stepTitle"></h2>
          <p id="stepDesc" class="stepDesc"></p>
          <div id="tip" class="tip"></div>
        </div>
        <div class="imageWrap">
          <img id="stepImage" class="stepImage" alt="" />
        </div>
      </section>

      <div id="dots" class="dots" aria-hidden="true"></div>
    </main>

    <nav class="footerNav" aria-label="단계 이동">
      <div class="footerInner">
        <button id="prevBtn" class="navButton prev" type="button">이전</button>
        <button id="nextBtn" class="navButton next" type="button">다음</button>
      </div>
    </nav>

    <script>
      const steps = [
        {
          title: "Apple Account 화면 열기",
          descHtml:
            'iPhone 또는 브라우저에서 <a class="inlineLink" href="https://account.apple.com/" target="_blank" rel="noopener noreferrer">Apple Account</a> 화면으로 이동해 주세요.',
          image: "/images/icloud-app-password-guide/step-1-login-entry.png",
          tip: "이미 로그인되어 있지 않다면 다음 단계에서 계정 정보를 입력합니다.",
        },
        {
          title: "Apple 계정으로 로그인",
          desc: "이메일(또는 전화번호)과 비밀번호를 입력해서 Apple 계정에 로그인하세요.",
          image: "/images/icloud-app-password-guide/step-2-sign-in.png",
          tip: "보안 확인(2단계 인증)이 나오면 안내에 따라 완료해 주세요.",
        },
        {
          title: "로그인 및 보안 메뉴 확인",
          desc: "계정 보안 항목에서 App-Specific Passwords(앱 전용 비밀번호)로 이동합니다.",
          image: "/images/icloud-app-password-guide/step-3-security-menu.png",
          tip: "iCloud 동기화에는 일반 Apple ID 비밀번호가 아니라 앱 전용 비밀번호가 필요합니다.",
        },
        {
          title: "앱 전용 비밀번호 목록 화면",
          desc: "현재 발급된 앱 전용 비밀번호 목록을 확인할 수 있습니다.",
          image: "/images/icloud-app-password-guide/step-4-password-list.png",
          tip: "새로 만들려면 우측의 + 버튼을 눌러 주세요.",
        },
        {
          title: "새 비밀번호 생성 이름 입력",
          desc: "식별하기 쉬운 이름(예: Riff)을 입력하고 생성(Create)을 눌러 주세요.",
          image: "/images/icloud-app-password-guide/step-5-create-name.png",
          tip: "서비스별로 이름을 달리하면 나중에 관리하기 편합니다.",
        },
        {
          title: "계정 비밀번호 재확인",
          desc: "보안을 위해 Apple 계정 비밀번호를 다시 입력하고 계속 진행합니다.",
          image: "/images/icloud-app-password-guide/step-6-confirm-password.png",
          tip: "이 단계까지 완료하면 앱 전용 비밀번호가 바로 발급됩니다.",
        },
        {
          title: "발급 비밀번호를 Riff에 입력",
          desc: "표시된 앱 전용 비밀번호를 복사해서 Riff iCloud 계정정보 입력 화면의 암호 칸에 붙여넣으세요.",
          image: "/images/icloud-app-password-guide/step-7-copy-password.png",
          tip: "비밀번호는 대소문자를 구분하며, 정확히 입력해야 동기화가 연결됩니다.",
        },
      ];

      const stepMeta = document.getElementById("stepMeta");
      const stepTitle = document.getElementById("stepTitle");
      const stepDesc = document.getElementById("stepDesc");
      const stepImage = document.getElementById("stepImage");
      const tip = document.getElementById("tip");
      const dots = document.getElementById("dots");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      let current = 0;

      function renderDots() {
        dots.innerHTML = "";
        steps.forEach((_, idx) => {
          const dot = document.createElement("span");
          dot.className = idx === current ? "dot active" : "dot";
          dots.appendChild(dot);
        });
      }

      function render() {
        const step = steps[current];
        stepMeta.textContent = `STEP ${current + 1} / ${steps.length}`;
        stepTitle.textContent = step.title;
        if (step.descHtml) {
          stepDesc.innerHTML = step.descHtml;
        } else {
          stepDesc.textContent = step.desc;
        }
        stepImage.src = step.image;
        stepImage.alt = `${step.title} 화면`;
        tip.textContent = "안내: " + step.tip;
        prevBtn.disabled = current === 0;
        nextBtn.disabled = current === steps.length - 1;
        nextBtn.textContent = current === steps.length - 1 ? "완료" : "다음";
        renderDots();
      }

      prevBtn.addEventListener("click", () => {
        if (current > 0) {
          current -= 1;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });

      nextBtn.addEventListener("click", () => {
        if (current < steps.length - 1) {
          current += 1;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          window.close();
        }
      });

      render();
    </script>
  </body>
</html>
